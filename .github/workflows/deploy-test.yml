name: Deploy To Test VPS

on:
  push:
    branches:
      - main
    paths:
      - setup.sh
      - renew_certs.sh
      - websocket/**
      - Xray/**
      - Nginx/**
      - .github/workflows/deploy-test.yml
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.TEST_VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Package deployment files
        run: |
          set -euo pipefail
          tar czf deploy.tar.gz setup.sh renew_certs.sh websocket/ws-stunnel Xray/config.json Xray/none.json Xray/direct.json Xray/xray.service Xray/xray@.service Xray/xray.linux.64bit Nginx/xray.conf

      - name: Upload package to VPS
        env:
          TEST_VPS_HOST: ${{ secrets.TEST_VPS_HOST }}
          TEST_VPS_USER: ${{ secrets.TEST_VPS_USER }}
          TEST_VPS_PORT: ${{ secrets.TEST_VPS_PORT }}
        run: |
          set -euo pipefail
          PORT="${TEST_VPS_PORT:-22}"
          REMOTE="${TEST_VPS_USER}@${TEST_VPS_HOST}"
          SSH_KEY="$HOME/.ssh/deploy_key"

          ssh -i "$SSH_KEY" -p "$PORT" -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null "$REMOTE" "mkdir -p /root/.deploy-xray"
          scp -i "$SSH_KEY" -P "$PORT" -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null deploy.tar.gz "$REMOTE:/root/.deploy-xray/deploy.tar.gz"

      - name: Apply deployment on VPS
        env:
          TEST_VPS_HOST: ${{ secrets.TEST_VPS_HOST }}
          TEST_VPS_USER: ${{ secrets.TEST_VPS_USER }}
          TEST_VPS_PORT: ${{ secrets.TEST_VPS_PORT }}
          TEST_DOMAIN: ${{ secrets.TEST_DOMAIN }}
        run: |
          set -euo pipefail
          PORT="${TEST_VPS_PORT:-22}"
          REMOTE="${TEST_VPS_USER}@${TEST_VPS_HOST}"
          SSH_KEY="$HOME/.ssh/deploy_key"

          ssh -i "$SSH_KEY" -p "$PORT" -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null "$REMOTE" 'set -euo pipefail; \
            STAGE="/root/.deploy-xray"; \
            REPO="/root/XrayMultiPath-SSH-WS"; \
            mkdir -p "$REPO"; \
            tar xzf "$STAGE/deploy.tar.gz" -C "$REPO"; \
            install -m 755 "$REPO/setup.sh" /root/setup.sh; \
            ws_changed=0; xray_changed=0; nginx_changed=0; \
            mkdir -p /usr/local/bin/websocket /usr/local/etc/xray /etc/nginx/conf.d; \
            if ! cmp -s "$REPO/websocket/ws-stunnel" /usr/local/bin/websocket/ws-stunnel 2>/dev/null; then install -m 755 "$REPO/websocket/ws-stunnel" /usr/local/bin/websocket/ws-stunnel; ws_changed=1; fi; \
            for cfg in config.json none.json direct.json; do if ! cmp -s "$REPO/Xray/$cfg" "/usr/local/etc/xray/$cfg" 2>/dev/null; then install -m 644 "$REPO/Xray/$cfg" "/usr/local/etc/xray/$cfg"; xray_changed=1; fi; done; \
            if ! cmp -s "$REPO/Xray/xray.service" /etc/systemd/system/xray.service 2>/dev/null; then install -m 644 "$REPO/Xray/xray.service" /etc/systemd/system/xray.service; xray_changed=1; fi; \
            if ! cmp -s "$REPO/Xray/xray@.service" /etc/systemd/system/xray@.service 2>/dev/null; then install -m 644 "$REPO/Xray/xray@.service" /etc/systemd/system/xray@.service; xray_changed=1; fi; \
            if ! cmp -s "$REPO/Xray/xray.linux.64bit" /usr/local/bin/xray 2>/dev/null; then tmp_xray=$(mktemp /tmp/xray-deploy.XXXXXX); install -m 755 "$REPO/Xray/xray.linux.64bit" "$tmp_xray"; "$tmp_xray" version >/dev/null 2>&1; install -m 755 "$tmp_xray" /usr/local/bin/xray; rm -f "$tmp_xray"; xray_changed=1; fi; \
            if ! cmp -s "$REPO/Nginx/xray.conf" /etc/nginx/conf.d/xray.conf 2>/dev/null; then install -m 644 "$REPO/Nginx/xray.conf" /etc/nginx/conf.d/xray.conf; nginx_changed=1; fi; \
            if ! cmp -s "$REPO/renew_certs.sh" /root/renew_certs.sh 2>/dev/null; then install -m 755 "$REPO/renew_certs.sh" /root/renew_certs.sh; fi; \
            echo "'"$TEST_DOMAIN"'" > /root/.acme_domain; \
            if ! crontab -l 2>/dev/null | grep -q "renew_certs.sh"; then (crontab -l 2>/dev/null; echo "0 3 1 * * /root/renew_certs.sh") | crontab -; fi; \
            if [ "$xray_changed" -eq 1 ]; then systemctl daemon-reload; systemctl enable xray xray@none xray@direct >/dev/null 2>&1 || true; systemctl restart xray xray@none xray@direct; fi; \
            if [ "$ws_changed" -eq 1 ]; then systemctl restart ws-stunnel; fi; \
            if [ "$nginx_changed" -eq 1 ]; then nginx -t; systemctl reload nginx; fi; \
            if systemctl list-unit-files | grep -q "^ws-stunnel.service"; then systemctl is-active --quiet ws-stunnel; fi; \
            if systemctl list-unit-files | grep -q "^xray.service"; then systemctl is-active --quiet xray; fi; \
            if systemctl list-unit-files | grep -q "^xray@.service"; then systemctl is-active --quiet xray@none; systemctl is-active --quiet xray@direct; fi; \
            curl -sS -I --max-time 10 http://127.0.0.1/ >/dev/null || true'

      - name: Deployment summary
        run: |
          echo "Deployment to test VPS completed."
